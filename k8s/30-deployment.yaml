# --------------------------------------------------------------------------
# Ana Deployment (STATELESS — HPA testine uygun).
#
# Bu manifest aşağıdaki kavramları tek seferde gösterir:
#   - imagePullPolicy, replicas, RollingUpdate stratejisi
#   - initContainer (Info sayfasındaki "init container işareti")
#   - liveness / readiness / startup probe (3 ayrı endpoint)
#   - downward API env (POD_NAME / POD_NAMESPACE / POD_IP / NODE_NAME ...)
#   - envFrom ConfigMap & Secret
#   - volumeMount ConfigMap, Secret, emptyDir
#   - resources.requests/limits (HPA ve OOMKilled demosu için)
#   - securityContext (non-root, readOnlyRootFilesystem)
#   - terminationGracePeriodSeconds + lifecycle.preStop (graceful shutdown)
#
# /data dizini emptyDir ile mount edilir → her Pod kendi izole alanına yazar,
# Pod silindiğinde içerik kaybolur. Kalıcı disk gereken senaryolar için bkz.
# kubernetes-101-workshop/labs/07-volume-pvc örneği.
# --------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sp
  namespace: k8s-playground
  labels:
    app.kubernetes.io/name: k8sp
spec:
  # 2 replika ile başlıyoruz → Service load-balancing ve HPA scale-up için ideal.
  # HPA aktif olduğunda bu değer HPA tarafından yönetilir; manifest'te sabit
  # tutmak HPA ile çakışmaz çünkü HPA 'replicas' alanını kendi yazar.
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sp
        app.kubernetes.io/version: "1.0.1"
      annotations:
        # Prometheus scrape annotation'ları (Prometheus Operator ile ServiceMonitor da yazılabilir)
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: k8sp-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      # --- Init container: /data altına marker dosyası bırakır ---------------
      initContainers:
        - name: init-marker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "init container çalıştı"        >  /data/init-marker.txt
              echo "node      = ${NODE_NAME}"      >> /data/init-marker.txt
              echo "pod       = ${POD_NAME}"       >> /data/init-marker.txt
              echo "namespace = ${POD_NAMESPACE}"  >> /data/init-marker.txt
              echo "tarih     = $(date -u +%FT%TZ)" >> /data/init-marker.txt
          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }

      containers:
        - name: web
          image: docker.io/cahityusuf/k8s-playground:v1.0.1
          # Eğitim sırasında aynı tag'i çok kez güncelliyoruz; Always politikası
          # node'da cache kalan eski imajı atlatır. Üretimde 'IfNotPresent' +
          # immutable tag'ler (örn. sürüm numarası ya da digest pin) tercih edilir.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ---- Probe'lar (3 tip) ------------------------------------------
          startupProbe:
            httpGet: { path: /healthz/startup, port: http }
            failureThreshold: 30      # 30 * 2s = 60 sn'ye kadar başlamasına izin ver
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /healthz/ready, port: http }
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet: { path: /healthz/live, port: http }
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2

          # ---- Kaynak sınırları (HPA + OOMKilled demosu için) -------------
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ---- Env: Downward API + ConfigMap + Secret ---------------------
          env:
            - name: APP_VERSION
              value: "1.0.1"
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_SERVICE_ACCOUNT
              valueFrom: { fieldRef: { fieldPath: spec.serviceAccountName } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: NODE_IP
              valueFrom: { fieldRef: { fieldPath: status.hostIP } }
          envFrom:
            - configMapRef: { name: k8sp-config }
            - secretRef:    { name: k8sp-secret }

          # ---- Mount'lar --------------------------------------------------
          volumeMounts:
            - name: cfg
              mountPath: /etc/k8s-config
              readOnly: true
            - name: sec
              mountPath: /etc/k8s-secret
              readOnly: true
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp

          # ---- Graceful shutdown ------------------------------------------
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 5  # endpoints'ten düşene kadar trafik akışını bitir

          # ---- Container-level security context ---------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # /tmp emptyDir ile mount edildiği için yazma sorunu olmaz
            capabilities: { drop: ["ALL"] }

      volumes:
        - name: cfg
          configMap:
            name: k8sp-config
        - name: sec
          secret:
            secretName: k8sp-secret
            defaultMode: 0400
        # /data → emptyDir. Her Pod kendi izole alanına yazar; Pod silindiğinde
        # içerik kaybolur. Bu, HPA ile birden çok replikanın aynı anda çalışmasına
        # izin verir (RWO PVC olsaydı MultiAttachError olurdu). Kalıcı disk
        # demosu için bkz. kubernetes-101-workshop/labs/07-volume-pvc.
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
