# Uygulamanın /data dizini için kalıcı disk.
# Storage tabındaki yazma/silme + dosya upload özelliği bu PVC üzerinde çalışır.
#
# Akış:
#   - Pod siliniip yeniden gelse de PVC node'a bağlı kalır → dosyalar korunur.
#   - 'emptyDir' ile karşılaştırma: emptyDir Pod ömrüyle birlikte yok olur, PVC olmaz.
#
# Not: ReadWriteOnce — bu PVC'ye AYNI ANDA SADECE TEK Pod yazabilir. Bu yüzden
# 30-deployment.yaml içinde 'replicas: 1' ve 'strategy: Recreate' kullanıyoruz.
# Birden çok replikaya kalıcı disk gerekirse RWX bir StorageClass (NFS, Longhorn,
# CephFS vb.) veya StatefulSet kullanmak gerekir.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8sp-data
  namespace: k8s-playground
  labels:
    app.kubernetes.io/name: k8sp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName: standard   # <-- kümeniz default class'a sahip değilse açın
