apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground
  namespace: playground
  labels: { app: playground }
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: playground }
  template:
    metadata:
      labels: { app: playground }
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: default

      # --- Init container: PVC'ye bir işaret bırakır (Info sayfasında görülür) ---
      initContainers:
      - name: init-marker
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
          - |
            echo "Init container çalıştı: $(date -u +%FT%TZ) — pod=$POD_NAME" \
                 > /data/init-marker.txt
            echo "[init] /data hazır."
        env:
        - name: POD_NAME
          valueFrom: { fieldRef: { fieldPath: metadata.name } }
        volumeMounts:
        - name: data
          mountPath: /data

      containers:
      # --- Ana konteyner ---
      - name: web
        image: docker.io/cahityusuf/k8s-playground:v1.0.1   # public registry'den çekilir
        imagePullPolicy: IfNotPresent
        ports:
        - { name: http, containerPort: 8080 }

        # Downward API ile Pod metadata env'leri
        env:
        - name: POD_NAME
          valueFrom: { fieldRef: { fieldPath: metadata.name } }
        - name: POD_NAMESPACE
          valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
        - name: POD_IP
          valueFrom: { fieldRef: { fieldPath: status.podIP } }
        - name: POD_SERVICE_ACCOUNT
          valueFrom: { fieldRef: { fieldPath: spec.serviceAccountName } }
        - name: NODE_NAME
          valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
        - name: NODE_IP
          valueFrom: { fieldRef: { fieldPath: status.hostIP } }
        - name: APP_VERSION
          value: "1.0.0"

        # ConfigMap ve Secret'ı topluca env olarak aktar
        envFrom:
        - configMapRef: { name: playground-config }
        - secretRef:    { name: playground-secret }

        # Volume mount'ları: ConfigMap, Secret ve PVC
        volumeMounts:
        - { name: config-files, mountPath: /etc/k8s-config, readOnly: true }
        - { name: secret-files, mountPath: /etc/k8s-secret, readOnly: true }
        - { name: data,         mountPath: /data }

        # Probe'lar — eğitim için bilinçli olarak farklı pathler
        startupProbe:
          httpGet: { path: /healthz/startup, port: http }
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet: { path: /healthz/live, port: http }
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet: { path: /healthz/ready, port: http }
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 2

        # OOMKilled ve HPA demoları için tipik değerler
        resources:
          requests: { cpu: "50m",  memory: "128Mi" }
          limits:   { cpu: "500m", memory: "256Mi" }

        # Graceful shutdown demosu için preStop hook
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "echo '[preStop] 5 sn bekleniyor...'; sleep 5"]

        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: false   # ASP.NET tmp gerektirir

      volumes:
      - name: config-files
        configMap:
          name: playground-config
          # Sadece dosya olarak bağlanacak anahtarlar
          items:
          - { key: appsettings.Production.json, path: appsettings.Production.json }
          - { key: banner.txt,                  path: banner.txt }
      - name: secret-files
        secret:
          secretName: playground-secret
          items:
          - { key: tls.key, path: tls.key }
      - name: data
        persistentVolumeClaim:
          claimName: playground-data
