# Job örneği: tek seferlik iş. Tamamlandığında Pod 'Completed' olur.
# 'kubectl get job,pod -n k8s-playground -l job-name=k8sp-hello' ile takip edin.
apiVersion: batch/v1
kind: Job
metadata:
  name: k8sp-hello
  namespace: k8s-playground
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: hello
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Merhaba Job!' && sleep 5 && echo 'Bitti.'"]
---
# CronJob: belirli aralıklarla iş üretir.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8sp-tick
  namespace: k8s-playground
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: tick
              image: busybox:1.36
              command: ["sh", "-c", "date -u +%FT%TZ; echo 'tik tak'"]
