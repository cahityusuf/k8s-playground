# Tüm manifestleri tek komutla uygulamak için kustomization.
# Kullanım:
#   kubectl apply -k k8s/
# Belirli bir kaynağı geri almak için:
#   kubectl delete -k k8s/
#
# NOT: NetworkPolicy ve ServiceMonitor opsiyoneldir. Kümenizde CNI'nın
# NetworkPolicy desteği yoksa veya Prometheus Operator kurulu değilse
# ilgili satırı bu listeden çıkarın.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-playground

resources:
  - 00-namespace.yaml
  - 10-configmap.yaml
  - 11-secret.yaml
  - 25-serviceaccount.yaml
  - 30-deployment.yaml             # stateless: replicas:2, RollingUpdate, /data emptyDir
  - 40-service.yaml
  - 50-ingress.yaml
  - 60-hpa.yaml                    # HPA aktif — /Stress sayfasından scale-up'ı tetikleyebilirsiniz
  - 61-pdb.yaml                    # 2+ replika için PDB anlamlı (drain sırasında 1 Pod hep ayakta)
  # Aşağıdaki satırları kümeniz destekliyorsa açabilirsiniz.
  # - 70-networkpolicy.yaml      # CNI NetworkPolicy desteklemiyorsa kapalı tutun
  # - 80-servicemonitor.yaml     # Prometheus Operator yoksa kapalı tutun
  # - 90-job-cronjob.yaml        # Job/CronJob demosunu istemiyorsanız kapalı tutun

labels:
  - pairs:
      app.kubernetes.io/part-of: k8s-playground
    includeSelectors: false
