# İleri konu: NetworkPolicy demosu.
# playground namespace'inde Pod'lara yalnızca ingress controller'dan ve aynı
# namespace'ten gelen trafiğe izin verir. Default (deny-all) etkisi yapar.
# Minikube'de Calico/Cilium gibi bir CNI gerekir; varsayılan CNI policy'yi
# uygulamaz. 'minikube start --cni=calico' ile başlatın.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: playground-allow
  namespace: playground
spec:
  podSelector: { matchLabels: { app: playground } }
  policyTypes: ["Ingress"]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels: { kubernetes.io/metadata.name: ingress-nginx }
    - podSelector: {}
    ports:
    - { protocol: TCP, port: 8080 }
