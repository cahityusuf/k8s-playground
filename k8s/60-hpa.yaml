# HPA (autoscaling/v2). Metrics Server kümenizde KURULU olmalıdır.
#   kubectl top pod -n k8s-playground   <-- bu çalışmıyorsa metrics-server kurun
#
# Demo:
#   /Stress sayfasından "20 sn × 2 worker" CPU yakın, replika sayısının
#   2 -> 4 -> ... arttığını izleyin: kubectl get hpa,pods -n k8s-playground -w
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: k8sp
  namespace: k8s-playground
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: k8sp
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
